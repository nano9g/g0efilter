---
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write  # Required for OIDC signing with Cosign

jobs:
  release:
    runs-on: ubuntu-latest
    environment: dockerhub
    timeout-minutes: 30
    # Only release tags pushed to main branch
    if: github.ref_type == 'tag' && github.event.base_ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code

      - name: go vet
        run: go vet ./...

      - name: Run tests
        run: go test -race -covermode=atomic -coverprofile=coverage.txt ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: >
            --timeout=10m
            ./...

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-major-tag:
    name: Move major version tag
    needs: release
    runs-on: ubuntu-latest
    # Prereleases (v1.0.0-rc1) must not move the rolling tag
    if: ${{ !contains(github.ref_name, '-') }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Move major tag to this release
        run: |
          MAJOR="${GITHUB_REF_NAME%%.*}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR" "$GITHUB_REF_NAME"
          git push origin "$MAJOR" --force
