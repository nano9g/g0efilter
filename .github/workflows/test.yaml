---
name: Tests

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'tests/e2e/**'
      - 'scripts/**'
      - 'examples/build/**'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        filter_mode: [https, dns]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2

      - name: Run e2e suite (${{ matrix.filter_mode }} mode)
        env:
          FILTER_MODE: ${{ matrix.filter_mode }}
        run: scripts/e2e.sh
