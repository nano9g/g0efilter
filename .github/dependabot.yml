version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "chore"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "gomod"
    directory: "/"
    groups:
      gomod:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    schedule:
      interval: "cron"
      cronjob: "0 9 * * *"
    labels: ["dependencies", "gomod"]
    commit-message:
      prefix: "chore"

  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/examples/build"
    schedule:
      interval: "cron"
      cronjob: "0 9 * * *"
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore"
    groups:
      docker:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"