---
version: "2"

formatters:
  enable:
    - gci

linters:
  default: all
  disable:
    - wsl  # Deprecated
    - varnamelen  # Too strict
    - exhaustruct  # Too strict
    - mnd  # Too strict
    - gomodguard  # Replaced by gomodguard_v2
  settings:
    depguard:
      rules:
        main:
          list-mode: lax
          files:
            - "$all"
          deny:
            - pkg: "math/rand$"
              desc: "Use math/rand/v2 instead"
    goconst:
      ignore-tests: true
    gomodguard_v2:
      local-replace-directives: true
    ireturn:
      allow:
        - anon
        - error
        - empty
        - stdlib
        - github.com/google/gopacket.Packet
